<svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="1200" height="1200" fill="#f8f8f8"/>

  <!-- Shadow -->
  <ellipse cx="600" cy="1050" rx="350" ry="80" fill="#000000" opacity="0.1"/>

  <!-- Harness main body - shown flat -->
  <!-- Main chest strap -->
  <rect x="400" y="350" width="400" height="80" rx="15" fill="#1C1C1C" stroke="#000000" stroke-width="2"/>

  <!-- Belly strap -->
  <rect x="420" y="480" width="360" height="70" rx="12" fill="#1C1C1C" stroke="#000000" stroke-width="2"/>

  <!-- Left side strap -->
  <path d="M 400 390 Q 350 450 380 550" stroke="#1C1C1C" stroke-width="50" fill="none" stroke-linecap="round"/>

  <!-- Right side strap -->
  <path d="M 800 390 Q 850 450 820 550" stroke="#1C1C1C" stroke-width="50" fill="none" stroke-linecap="round"/>

  <!-- Front clip attachment point (red accent) -->
  <circle cx="600" cy="390" r="35" fill="#DC143C" stroke="#8B0000" stroke-width="2"/>
  <circle cx="600" cy="390" r="25" fill="#FF6B6B" opacity="0.8"/>
  <text x="600" y="400" font-size="16" font-weight="bold" text-anchor="middle" fill="#FFFFFF">D</text>

  <!-- Adjustment buckles -->
  <g>
    <!-- Left buckle -->
    <rect x="330" y="470" width="50" height="40" rx="5" fill="#666666" stroke="#333333" stroke-width="1"/>
    <!-- Right buckle -->
    <rect x="820" y="470" width="50" height="40" rx="5" fill="#666666" stroke="#333333" stroke-width="1"/>
  </g>

  <!-- Reflective strip detail -->
  <g opacity="0.6">
    <line x1="480" y1="380" x2="520" y2="380" stroke="#FFD700" stroke-width="4"/>
    <line x1="680" y1="380" x2="720" y2="380" stroke="#FFD700" stroke-width="4"/>
  </g>

  <!-- Padding indication -->
  <g opacity="0.3" fill="none" stroke="#333333" stroke-width="2">
    <line x1="450" y1="365" x2="750" y2="365"/>
    <line x1="450" y1="395" x2="750" y2="395"/>
  </g>

  <!-- Sizing detail -->
  <text x="600" y="680" font-size="20" text-anchor="middle" font-family="Arial, sans-serif" fill="#666666">
    Adjustable Sizing • No-Pull Front Clip
  </text>

  <!-- Product name -->
  <text x="600" y="900" font-size="48" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif" fill="#333333">
    No-Pull Walk Harness
  </text>
  <text x="600" y="960" font-size="36" text-anchor="middle" font-family="Arial, sans-serif" fill="#DC143C" font-weight="bold">
    $32.00
  </text>
</svg>
