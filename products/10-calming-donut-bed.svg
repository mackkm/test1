<svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="1200" fill="#f8f8f8"/>
  <ellipse cx="600" cy="780" rx="420" ry="90" fill="#000000" opacity="0.1"/>

  <!-- Outer fluffy ring -->
  <ellipse cx="600" cy="550" rx="380" ry="250" fill="#E8DCC8"/>
  <!-- Inner cushion -->
  <ellipse cx="600" cy="560" rx="250" ry="150" fill="#D8C4A8"/>

  <!-- Fluffy texture on ring (scalloped bumps) -->
  <g fill="#F0E6D6">
    <circle cx="320" cy="500" r="55"/>
    <circle cx="370" cy="400" r="55"/>
    <circle cx="470" cy="340" r="55"/>
    <circle cx="600" cy="320" r="55"/>
    <circle cx="730" cy="340" r="55"/>
    <circle cx="830" cy="400" r="55"/>
    <circle cx="880" cy="500" r="55"/>
    <circle cx="850" cy="620" r="55"/>
    <circle cx="350" cy="620" r="55"/>
  </g>

  <!-- Inner shadow for depth -->
  <ellipse cx="600" cy="560" rx="250" ry="150" fill="none" stroke="#C2AC8A" stroke-width="6" opacity="0.5"/>
  <ellipse cx="580" cy="530" rx="120" ry="70" fill="#FFFFFF" opacity="0.15"/>

  <text x="600" y="900" font-size="48" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif" fill="#333333">Calming Donut Bed</text>
  <text x="600" y="960" font-size="36" text-anchor="middle" font-family="Arial, sans-serif" fill="#C2AC8A" font-weight="bold">$48.00</text>
</svg>
